version: '3.8'
services:
  postgres:
    image: postgres:16
    container_name: geo-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - geo-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./Backend/geo-monitor
      dockerfile: Dockerfile
    container_name: geo-backend
    environment:
      GEO_DB_URL: ${GEO_DB_URL}
      GEO_DB_USER: ${GEO_DB_USER}
      GEO_DB_PASS: ${GEO_DB_PASS}
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  geo-data: